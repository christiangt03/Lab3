name: Matrix Build Enterprise
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
 
permissions:
  contents: read
 
jobs:
  build:
    name: build-${{ matrix.os }}-node${{ matrix.node }}-${{ matrix.mode }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20]
        mode: [debug, release]
        exclude:
          - os: windows-latest
            node: 18
          - os: windows-latest
            mode: debug
        include:
          # Extiende el job ubuntu+node20+release con variables de producción
          - os: ubuntu-latest
            node: 20
            mode: release
            deploy_env: prod
            artifact_name: app-prod-bundle
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
 
      - name: Show matrix variables
        shell: bash
        run: |
          echo "OS:    ${{ matrix.os }}"
          echo "Node:  ${{ matrix.node }}"
          echo "Mode:  ${{ matrix.mode }}"
          node --version
 
      - name: Simulated build
        shell: bash
        run: |
          if [ "${{ matrix.mode }}" = "debug" ]; then
            echo "Building with DEBUG flags (verbose, no minify)"
          else
            echo "Building with RELEASE flags (optimize, minify)"
          fi
          sleep 3
          echo "Build OK"
 
      # Solo se ejecuta cuando matrix.deploy_env existe (job de producción)
      - name: Production-only packaging
        if: matrix.deploy_env == 'prod'
        shell: bash
        run: |
          echo "Packaging artifact for deploy_env=${{ matrix.deploy_env }}"
          echo "Artifact name: ${{ matrix.artifact_name }}"
          mkdir -p dist
          echo "build-id=$(date +%s)" > dist/${{ matrix.artifact_name }}.txt
          cat dist/${{ matrix.artifact_name }}.txt
